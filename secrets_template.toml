# This is a template for Streamlit secrets configuration
# Copy your Google Service Account JSON content below
# Find this file at: ~/.streamlit/secrets.toml (on Linux/Mac) or %APPDATA%\.streamlit\secrets.toml (on Windows)

# Google Service Account credentials
# Get this from Google Cloud Console: https://console.cloud.google.com/
[google_service_account]
type = "service_account"
project_id = "your-project-id"
private_key_id = "your-private-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
client_email = "your-service-account@your-project.iam.gserviceaccount.com"
client_id = "your-client-id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/your-service-account%40your-project.iam.gserviceaccount.com"

# Google Sheet URL
sheet_url = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/edit"

# Admin password
admin_password = "your-secure-admin-password"

# Ticket price
ticket_amount = "299"
ticket_template_path = "assets/ticket_logo.jpeg"
# Optional: control how/where the ticket QR is embedded into the template image.
# - ticket_template_qr_scale: QR size relative to min(template_width, template_height)
# - ticket_template_qr_center_x / _y: normalized (0..1) center position of the QR on the template
ticket_template_qr_scale = 0.27
ticket_template_qr_center_x = 0.5
ticket_template_qr_center_y = 0.39
ticket_template_qr_padding_scale = 0.08
ticket_template_fit_mode = "photo_square"
ticket_template_photo_square_inset_scale = 0.04
ticket_template_photo_square_inset_top_scale = 0.06
ticket_template_photo_square_offset_y_scale = 0.02

# UPI payment details
upi_id = "concert@upi"
merchant_name = "Notebook Concert"

# SMTP email delivery
smtp_host = "smtp.gmail.com"
smtp_port = 587
smtp_username = "your-email@example.com"
smtp_password = "your-app-password"
smtp_from_email = "your-email@example.com"
smtp_from_name = "The Notebook Concert"
smtp_use_tls = true

# WhatsApp Cloud API delivery
# Create these in Meta for Developers > WhatsApp.
whatsapp_access_token = "your-whatsapp-cloud-api-access-token"
whatsapp_phone_number_id = "your-phone-number-id"
whatsapp_api_version = "v20.0"
